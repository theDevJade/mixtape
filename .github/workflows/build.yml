name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  # ── Analyze ───────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  # ── Android ───────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/mixtape.app"
          if [ ! -d "$APP_PATH" ]; then
            # Try alternate casing
            APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found"
            find build/macos -name "*.app" 2>/dev/null
            exit 1
          fi
          DMG_DIR="build/macos/Build/Products/Release"
          hdiutil create -volname Mixtape \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_DIR/Mixtape-macOS.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/Build/Products/Release/Mixtape-macOS.dmg
          retention-days: 14

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev libwebkit2gtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mixtape_vr/target
          key: linux-cargo-${{ hashFiles('mixtape_vr/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build Rust VR bridge (Linux)
        working-directory: mixtape_vr
        run: cargo build --release --features steamvr

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Create Linux platform files if missing
        run: |
          if [ ! -d "linux" ]; then
            flutter create --platforms=linux .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle VR library
        run: |
          cp mixtape_vr/target/release/libmixtape_vr.so \
            build/linux/x64/release/bundle/lib/libmixtape_vr.so

      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/Mixtape-Linux-x64.tar.gz" .

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-tarball
          path: Mixtape-Linux-x64.tar.gz
          retention-days: 14

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mixtape_vr/target
          key: windows-cargo-${{ hashFiles('mixtape_vr/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build Rust VR bridge (Windows)
        working-directory: mixtape_vr
        run: cargo build --release --features steamvr

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create Windows platform files if missing
        run: |
          if (!(Test-Path "windows")) {
            flutter create --platforms=windows .
          }
        shell: pwsh

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle VR library
        run: Copy-Item mixtape_vr\target\release\mixtape_vr.dll build\windows\x64\runner\Release\
        shell: pwsh

      - name: Create ZIP
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "Mixtape-Windows-x64.zip"
        shell: pwsh

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-zip
          path: Mixtape-Windows-x64.zip
          retention-days: 14
